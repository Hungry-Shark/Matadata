<body class="bg-warm-cream min-h-screen font-body-md text-on-surface antialiased flex flex-col items-center justify-center p-xl">
<!-- Progress Indicator -->
<div class="fixed top-xl left-0 w-full flex justify-center px-xl gap-sm">
<div class="h-2 flex-1 rounded-full bg-deep-cream"></div>
<div class="h-2 flex-1 rounded-full bg-deep-cream"></div>
<div class="h-2 flex-1 rounded-full bg-deep-cream"></div>
<div class="h-2 flex-1 rounded-full bg-election-amber"></div>
</div>
<main class="w-full max-w-[390px] mx-auto flex flex-col gap-2xl">
<!-- Header Section -->
<div class="text-center">
<h1 class="font-display-lg text-display-lg text-primary-ink tracking-tight mb-sm">Where are you voting?</h1>
<p class="font-body-md text-body-md text-text-secondary">We need your location to show you the candidates for your specific constituency.</p>
</div>
<!-- Content Card -->
<div class="bg-pure-white rounded-[24px] p-xl shadow-[0_8px_30px_rgba(0,0,0,0.08)] flex flex-col gap-lg border border-surface-container-highest">
<!-- Pincode Input -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface-variant font-semibold uppercase tracking-wider" for="pincode">Enter Pincode</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-text-muted">pin_drop</span>
<input class="w-full h-[64px] bg-deep-cream border-none rounded-lg pl-[48px] pr-md font-mono-sm text-[24px] text-primary-ink text-center tracking-[0.5em] placeholder:text-text-muted/50 focus:ring-2 focus:ring-election-amber focus:outline-none transition-shadow" id="pincode" maxlength="6" placeholder="000000" type="text"/>
</div>
</div>
<div class="flex items-center justify-center gap-sm text-text-muted">
<div class="h-px bg-surface-container-high flex-1"></div>
<span class="font-body-xs text-body-xs uppercase tracking-widest">or</span>
<div class="h-px bg-surface-container-high flex-1"></div>
</div>
<!-- GPS Button -->
<button class="w-full h-[56px] flex items-center justify-center gap-sm bg-pure-white border-2 border-surface-container-highest rounded-full text-primary-ink font-body-md text-body-md font-semibold hover:bg-warm-cream transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
                Use my current location
            </button>
</div>
<!-- Language Selection -->
<div class="flex flex-col gap-md items-center mt-lg">
<p class="font-body-sm text-body-sm text-text-secondary uppercase tracking-widest font-semibold">Preferred Language</p>
<div class="flex gap-sm bg-deep-cream p-xs rounded-full">
<button class="px-xl py-sm rounded-full bg-primary-ink text-pure-white font-body-md text-body-md font-medium shadow-sm transition-all">हिंदी</button>
<button class="px-xl py-sm rounded-full text-text-secondary hover:text-primary-ink font-body-md text-body-md font-medium transition-all">English</button>
</div>
</div>
<!-- Spacer -->
<div class="flex-1"></div>
<!-- Primary CTA -->
<button class="w-full h-[56px] bg-election-amber text-pure-white rounded-full font-body-lg text-body-lg font-bold shadow-[0_4px_14px_rgba(245,166,35,0.4)] flex items-center justify-center gap-sm hover:bg-amber-dark transition-all active:scale-[0.98] mt-2xl">

</button>
