        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-primary-ink text-pure-white min-h-screen flex flex-col items-center justify-between font-body-md relative overflow-hidden">
<!-- Top Action Bar -->
<header class="w-full flex justify-between items-center p-xl z-10">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest/10 backdrop-blur-md text-pure-white hover:bg-surface-container-lowest/20 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex items-center gap-sm bg-success-green/20 border border-success-green/30 px-lg py-sm rounded-full backdrop-blur-md">
<span class="w-2 h-2 rounded-full bg-success-green animate-pulse"></span>
<span class="font-mono-sm text-mono-sm text-success-green tracking-wider uppercase">Listening</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest/10 backdrop-blur-md text-pure-white hover:bg-surface-container-lowest/20 transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Center Stage: Voice Orb -->
<main class="flex-1 w-full flex flex-col items-center justify-center px-xl relative z-10">
<!-- Ambient Glow Base -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-election-amber/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Voice Orb Container -->
<div class="relative flex items-center justify-center w-[200px] h-[200px] mb-4xl">
<!-- Pulsing Rings -->
<div class="absolute inset-0 border-2 border-election-amber/30 rounded-full animate-ping [animation-duration:3s]"></div>
<div class="absolute inset-lg border border-election-amber/20 rounded-full animate-ping [animation-duration:2s] [animation-delay:0.5s]"></div>
<!-- The Orb -->
<div class="w-[140px] h-[140px] rounded-full bg-gradient-to-br from-election-amber to-amber-dark shadow-[0_0_60px_rgba(245,166,35,0.4)] flex items-center justify-center relative overflow-hidden">
<!-- Inner glow -->
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
<!-- Waveform Lines (Abstract representation) -->
<div class="flex gap-1 items-center justify-center h-full z-10">
<div class="w-1.5 h-6 bg-pure-white/80 rounded-full"></div>
<div class="w-1.5 h-12 bg-pure-white/90 rounded-full"></div>
<div class="w-1.5 h-8 bg-pure-white/80 rounded-full"></div>
<div class="w-1.5 h-16 bg-pure-white rounded-full"></div>
<div class="w-1.5 h-10 bg-pure-white/90 rounded-full"></div>
<div class="w-1.5 h-5 bg-pure-white/70 rounded-full"></div>
</div>
</div>
</div>
<!-- Typography Area -->
<div class="text-center w-full max-w-md mx-auto space-y-xl">
<!-- AI Output (Placeholder / Expected response area) -->
<h1 class="font-display-md text-display-md text-pure-white/90 leading-tight">
                How can I help you find your local representatives?
            </h1>
<!-- User Input Transcript -->
<p class="font-body-xl text-body-xl text-election-amber italic opacity-80">
                "Show me the candidates for..."
            </p>
</div>
</main>
<!-- Bottom Controls -->
<footer class="w-full p-xl flex justify-center pb-4xl z-10 relative">
<!-- Subtle gradient mask for bottom text -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-primary-ink to-transparent pointer-events-none"></div>
<div class="flex flex-col items-center gap-md z-10">
<button class="w-16 h-16 rounded-full bg-surface-container-lowest/10 backdrop-blur-xl border border-surface-container-lowest/20 flex items-center justify-center text-pure-white hover:bg-surface-container-lowest/20 transition-all">
<span class="material-symbols-outlined text-[32px]">keyboard</span>
</button>
<span class="font-mono-sm text-mono-sm text-text-muted uppercase tracking-widest">Type Instead</span>
</div>
</footer>
